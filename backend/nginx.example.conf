# Example Nginx Configuration for Phase 2 Scalability
# This handles Load Balancing across PM2 instances and WebSocket Upgrades

upstream backend_nodes {
    # If using multiple different servers, list them here.
    # If using PM2 cluster mode on a single server, PM2 handles the 
    # internal load balancing across CPU cores, so we just point to the 
    # PM2 port (default 5000).
    server 127.0.0.1:5000;
    
    # Example for multiple servers:
    # server 10.0.0.1:5000;
    # server 10.0.0.2:5000;
}

server {
    listen 80;
    server_name api.yourdomain.com;

    location / {
        proxy_pass http://backend_nodes;
        proxy_http_version 1.1;
        
        # Forward Client IP
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $host;

        # WebSocket Support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Serve uploads directly (if not using S3 and sharing disk)
    location /uploads/ {
        alias /var/www/todo-app/backend/uploads/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }
}
